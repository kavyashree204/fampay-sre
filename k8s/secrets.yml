apiVersion: v1
kind: Secret
metadata:
  name: bran-secrets
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "your-production-secret-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bran-config
data:
  HODOR_URL: "http://hodor:8080"
  DEBUG: "False"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hodor-config
data:
  APP_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: hodor-secrets
type: Opaque
stringData:
  SOME_API_KEY: "your-api-key-here"