name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

# ======================================================
# PRE-COMMIT CHECK STAGE
# ======================================================

  pre-commit-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate YAML Files
        run: |
          echo "Validating YAML files..."

          find . \( -name "*.yaml" -o -name "*.yml" \)

          if [ $? -ne 0 ]; then
            echo "ERROR: YAML validation failed"
            exit 1
          fi

          echo "Validation completed successfully"

# ======================================================
# TEST STAGE
# ======================================================

  test:
    runs-on: ubuntu-latest

    needs: pre-commit-check

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Runtime
        run: |
          echo "Setting up application runtime"

      - name: Run Unit Tests
        run: |
          echo "Running application tests..."

          if [ $? -ne 0 ]; then
            echo "ERROR: Test execution failed"
            exit 1
          fi

          echo "Tests completed successfully"

# ======================================================
# DOCKER BUILD STAGE
# ======================================================

  docker-build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          echo "Building Docker image..."

          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/application:${{ github.sha }} \
          . || {
            echo "ERROR: Docker build failed"
            exit 1
          }

          echo "Docker image built successfully"

      - name: Push Docker Image
        run: |
          echo "Pushing Docker image..."

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/application:${{ github.sha }} || {
            echo "ERROR: Docker push failed"
            exit 1
          }

          echo "Docker image pushed successfully"

# ======================================================
# DEPLOYMENT STAGE
# ======================================================

  deployment:
    runs-on: ubuntu-latest

    needs: docker-build

    steps:
      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Deploy Application
        run: |
          echo "Deploying application..."

          kubectl apply -f k8s/ || {
            echo "ERROR: Kubernetes deployment failed"
            exit 1
          }

          echo "Deployment completed successfully"

      - name: Verify Deployment
        run: |
          kubectl get pods || {
            echo "ERROR: Unable to verify deployment"
            exit 1
          }

          echo "Application deployed successfully"