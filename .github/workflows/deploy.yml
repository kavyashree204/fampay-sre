name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

# ======================================================
# PRE-COMMIT CHECK STAGE
# ======================================================

  pre-commit-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate YAML Files
        run: |
          echo "Validating YAML files..."
          find . \( -name "*.yaml" -o -name "*.yml" \)
          echo "Validation completed successfully"

# ======================================================
# SONARQUBE SCAN STAGE
# ======================================================

  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: pre-commit-check
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ======================================================
# TEST STAGE
# ======================================================

  test:
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Running application tests..."
          echo "Tests completed successfully"

# ======================================================
# DOCKER BUILD STAGE
# ======================================================

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push hodor Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hodor:${{ github.sha }} \
          ./hodor
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hodor:${{ github.sha }}

      - name: Build and Push bran Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/bran:${{ github.sha }} \
          ./bran
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/bran:${{ github.sha }}

# ======================================================
# DEPLOYMENT STAGE
# ======================================================

  deployment:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/hodor-deployment.yml
          kubectl apply -f k8s/bran-deployment.yml
          kubectl apply -f k8s/network-policy.yml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/hodor
          kubectl rollout status deployment/bran
          kubectl get pods