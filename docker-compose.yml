version: '3.8'

networks:
  bran-hodor-network:
    driver: bridge
  public-network:
    driver: bridge

services:
  hodor:
    build: ./hodor
    networks:
      - public-network
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bran:
    build: ./bran
    networks:
      - bran-hodor-network
      - public-network
    environment:
      - DJANGO_SECRET_KEY=super-secret-key-change-in-prod
      - HODOR_URL=http://hodor:8080
      - DEBUG=False
    depends_on:
      - hodor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public-network
    depends_on:
      - hodor
      - bran
    restart: unless-stopped